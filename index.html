<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Творческая Доска</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfdfd; --mint: #e2f5ee; --lavender: #f3e5f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; overflow-x: hidden; }
        .board { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding-bottom: 100px; padding-top: 20px; }
        
        .sticker { 
            width: 135px; height: 135px; padding: 15px; 
            box-shadow: 5px 5px 12px rgba(0,0,0,0.07); 
            cursor: pointer; display: flex; flex-direction: column;
            box-sizing: border-box;
        }
        .idea { background: var(--mint); }
        .plan { background: var(--lavender); }
        .sticker h3 { font-size: 15px; margin: 0 0 8px; color: #333; font-weight: 600; }
        .sticker p { font-size: 12px; color: #666; margin: 0; line-height: 1.4; overflow: hidden; }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; 
        }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .save-btn { background: #5c6bc0; color: white; padding: 8px 18px; border-radius: 20px; font-size: 14px; }
        
        textarea { 
            width: 100%; height: 75%; border: none; outline: none; 
            font-size: 18px; line-height: 1.6; resize: none; background: transparent;
        }

        .add-btns { 
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; gap: 15px; justify-content: center; z-index: 50;
        }
        .btn { 
            padding: 12px 24px; border-radius: 30px; border: none; 
            color: #444; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.12); 
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="board" class="board"></div>

<div class="add-btns">
    <button class="btn" style="background: var(--mint);" onclick="createNew('idea')">+ Идея</button>
    <button class="btn" style="background: var(--lavender);" onclick="createNew('plan')">+ План</button>
</div>

<div id="modal" class="modal">
    <div class="controls">
        <div onclick="closeEditor()" style="cursor: pointer; color: #666;">← Назад</div>
        <div class="save-btn" onclick="saveData()">Сохранить</div>
    </div>
    <input type="text" id="edit-title" placeholder="Название..." style="width: 100%; font-size: 24px; border: none; font-weight: bold; margin-bottom: 15px; outline: none;">
    <textarea id="edit-content" placeholder="Начни писать здесь..."></textarea>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Начальные данные, чтобы доска не была пустой
    const defaultNotes = [
        { id: 1, type: 'idea', title: 'Идея для поста', content: 'Обсудить с мамой идеи для нового Reels', angle: -2 },
        { id: 2, type: 'plan', title: 'Дела на сегодня', content: '1. Проверить уведомления\n2. Написать сценарий', angle: 3 }
    ];

    let notes = JSON.parse(localStorage.getItem('my_notes_v1'));
    if (!notes || notes.length === 0) {
        notes = defaultNotes;
    }

    let currentId = null;

    function render() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        notes.forEach(n => {
            const div = document.createElement('div');
            div.className = sticker ${n.type};
            div.style.transform = rotate(${n.angle}deg);
            div.onclick = () => openEditor(n.id);
            const displayContent = n.content.length > 50 ? n.content.substring(0, 50) + '...' : n.content;
            div.innerHTML = <h3>${n.title || (n.type === 'idea' ? 'Идея' : 'План')}</h3><p>${displayContent}</p>;
            board.appendChild(div);
        });
    }

    window.createNew = function(type) {
        const id = Date.now();
        const newNote = { id, type, title: '', content: '', angle: (Math.random() * 6 - 3).toFixed(1) };
        notes.push(newNote);
        openEditor(id);
    };

    window.openEditor = function(id) {
        currentId = id;
        const note = notes.find(n => n.id === id);
        document.getElementById('edit-title').value = note.title;
        document.getElementById('edit-content').value = note.content;
        document.getElementById('modal').style.display = 'block';
    };

    window.saveData = function() {
        const note = notes.find(n => n.id === currentId);
        note.title = document.getElementById('edit-title').value;
        note.content = document.getElementById('edit-content').value;
        localStorage.setItem('my_notes_v1', JSON.stringify(notes));
        render();
        closeEditor();
    };

    window.closeEditor = function() {
        document.getElementById('modal').style.display = 'none';
    };

    // Авто-список для планов
    document.getElementById('edit-content').addEventListener('keydown', function(e) {
        const note = notes.find(n => n.id === currentId);
        if (e.key === 'Enter' && note && note.type === 'plan') {
            const pos = this.selectionStart;
            const textBefore = this.value.substring(0, pos);
            const lines = textBefore.split('\n');
            const lastLine = lines[lines.length - 1];
            const match = lastLine.match(/^(\d+)\./);
            
            if (match) {
                e.preventDefault();
                const nextNum = parseInt(match[1]) + 1;
                const insertText = '\n' + nextNum + '. ';
                this.value = this.value.substring(0, pos) + insertText + this.value.substring(pos);
                this.selectionStart = this.selectionEnd = pos + insertText.length;
            }
        }
    });

    render();
</script>
</body>
</html>
