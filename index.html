<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доска</title>
    <style>
        body { background: #f0f0f0; font-family: sans-serif; padding: 20px; }
        .board { display: flex; flex-wrap: wrap; gap: 10px; }
        .sticker { 
            width: 140px; height: 140px; padding: 10px; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            background: #e2f5ee; /* Мятный по умолчанию */
        }
        .plan { background: #f3e5f5; } /* Лавандовый */
        .btn-panel { position: fixed; bottom: 20px; width: 100%; display: flex; gap: 10px; justify-content: center; left: 0; }
        button { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="board" class="board">
    <div class="sticker"><h3>Идея</h3><p>Нажми на кнопку внизу, чтобы добавить новую</p></div>
    <div class="sticker plan"><h3>План</h3><p>Это лавандовый стикер для списка</p></div>
</div>

<div class="btn-panel">
    <button onclick="addSticker('#e2f5ee')">+ Идея</button>
    <button onclick="addSticker('#f3e5f5')">+ План</button>
</div>

<script>
    function addSticker(color) {
        const board = document.getElementById('board');
        const newSticker = document.createElement('div');
        newSticker.className = 'sticker';
        if(color === '#f3e5f5') newSticker.classList.add('plan');
        newSticker.style.transform = "rotate(" + (Math.random() * 6 - 3) + "deg)";
        newSticker.innerHTML = "<h3>Новый</h3><p>Текст заметки...</p>";
        board.appendChild(newSticker);
    }
</script>

</body>
</html>
