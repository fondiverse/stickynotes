<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Творческая Доска</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --mint: #e2f5ee;
            --lavender: #f3e5f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .sticker {
            width: 140px;
            height: 140px;
            padding: 15px;
            cursor: pointer;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .sticker h3 { margin: 0; font-size: 16px; color: #333; }
        .sticker p { font-size: 12px; color: #666; flex-grow: 1; overflow: hidden; }
        
        .idea { background-color: var(--mint); }
        .plan { background-color: var(--lavender); }

        /* Эффект при клике — разворачивание */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .close-btn {
            background: #eee;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sticker idea" style="transform: rotate(-2deg);" onclick="openSticker('Идея для Reels', 'Тут будет текст твоей идеи...')">
        <h3>Идея для Reels</h3>
        <p>Нажать, чтобы открыть...</p>
    </div>

    <div class="sticker plan" style="transform: rotate(3deg);" onclick="openSticker('Список покупок', '1. Кофе\n2. Цветы')">
        <h3>Список покупок</h3>
        <p>Нажать, чтобы открыть...</p>
    </div>

    <div id="modal" class="modal">
        <div class="close-btn" onclick="closeSticker()">← Назад к доске</div>
        <h2 id="modal-title"></h2>
        <textarea id="modal-content" style="width: 100%; height: 70%; border: none; outline: none; font-size: 18px;"></textarea>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение в телеграме

        function openSticker(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').value = content;
            document.getElementById('modal').style.display = 'block';
        }

        function closeSticker() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
