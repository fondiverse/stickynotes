<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Творческая Доска</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfdfd; --mint: #e2f5ee; --lavender: #f3e5f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .board { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding-bottom: 80px; }
        
        .sticker { 
            width: 130px; height: 130px; padding: 12px; 
            box-shadow: 4px 4px 10px rgba(0,0,0,0.05); 
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .idea { background: var(--mint); }
        .plan { background: var(--lavender); }
        .sticker h3 { font-size: 14px; margin: 0 0 5px; color: #444; }
        .sticker p { font-size: 11px; color: #777; margin: 0; line-height: 1.3; }

        /* Окно редактора */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; 
        }
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .save-btn { color: #5c6bc0; font-weight: bold; cursor: pointer; }
        
        textarea { 
            width: 100%; height: 80%; border: none; outline: none; 
            font-size: 18px; line-height: 1.6; resize: none; 
        }

        /* Кнопки внизу */
        .add-btns { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; 
        }
        .btn { 
            padding: 12px 20px; border-radius: 25px; border: none; 
            color: #444; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

<div id="board" class="board"></div>

<div class="add-btns">
    <button class="btn" style="background: var(--mint);" onclick="createNew('idea')">+ Идея</button>
    <button class="btn" style="background: var(--lavender);" onclick="createNew('plan')">+ План</button>
</div>

<div id="modal" class="modal">
    <div class="controls">
        <div onclick="closeEditor()">← Назад</div>
        <div class="save-btn" onclick="saveData()">Сохранить</div>
    </div>
    <input type="text" id="edit-title" placeholder="Название..." style="width: 100%; font-size: 22px; border: none; font-weight: bold; margin-bottom: 15px; outline: none;">
    <textarea id="edit-content" placeholder="Пиши сюда..."></textarea>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let notes = JSON.parse(localStorage.getItem('my_notes') || '[]');
    let currentId = null;

    function render() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        notes.forEach(n => {
            const div = document.createElement('div');
            div.className = sticker ${n.type};
            div.style.transform = rotate(${n.angle}deg);
            div.onclick = () => openEditor(n.id);
            div.innerHTML = <h3>${n.title || (n.type === 'idea' ? 'Идея' : 'План')}</h3><p>${n.content.substring(0, 40)}...</p>;
            board.appendChild(div);
        });
    }

    function createNew(type) {
        const id = Date.now();
        notes.push({ id, type, title: '', content: '', angle: (Math.random() * 6 - 3).toFixed(1) });
        openEditor(id);
    }

    function openEditor(id) {
        currentId = id;
        const note = notes.find(n => n.id === id);
        document.getElementById('edit-title').value = note.title;
        document.getElementById('edit-content').value = note.content;
        document.getElementById('modal').style.display = 'block';
    }
    function saveData() {
        const note = notes.find(n => n.id === currentId);
        note.title = document.getElementById('edit-title').value;
        note.content = document.getElementById('edit-content').value;
        localStorage.setItem('my_notes', JSON.stringify(notes));
        render();
        closeEditor();
    }

    function closeEditor() {
        document.getElementById('modal').style.display = 'none';
    }

    // Авто-список для планов
    document.getElementById('edit-content').addEventListener('keydown', function(e) {
        const note = notes.find(n => n.id === currentId);
        if (e.key === 'Enter' && note.type === 'plan') {
            const val = this.value;
            const lines = val.split('\n');
            const lastLine = lines[lines.length - 1];
            const match = lastLine.match(/^(\d+)\./);
            if (match) {
                e.preventDefault();
                const nextNum = parseInt(match[1]) + 1;
                this.value = val + '\n' + nextNum + '. ';
            } else if (lines.length === 1 && val !== '') {
                // Если это первая строка и в ней нет цифры, добавим 2. (для начала списка)
                // Но лучше просто вручную начать "1. "
            }
        }
    });

    render();
</script>
</body>
</html>
